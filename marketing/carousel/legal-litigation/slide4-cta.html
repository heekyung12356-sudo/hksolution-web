<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }

</head>
<body>
  <div style="width: 1080px; height: 1350px; overflow: hidden; position: relative; background: #15295A; color: white;">

    <div style="position: absolute; inset: 0; background: linear-gradient(180deg, rgba(15,27,61,0.96) 0%, rgba(15,27,61,0.78) 50%, rgba(15,27,61,0.98) 100%);"></div>

    <div style="position: absolute; top: 60px; left: 80px; display: flex; align-items: center; gap: 12px; z-index: 10;">
      <div style="width: 40px; height: 40px; background: linear-gradient(135deg, #4143C1, #5B5DD6); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800;">HK</div>
      <span style="font-size: 20px; font-weight: 600; color: rgba(255,255,255,0.6);">HK Solution</span>
    </div>

      <div style="width: 12px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px;"></div>

    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 800px; text-align: center; z-index: 10;">
      <div style="font-size: 120px; color: #5B5DD6; opacity: 0.3; line-height: 0.8; margin-bottom: 20px;">⚖️</div>
      <h2 style="font-size: 54px; font-weight: 800; line-height: 1.15; letter-spacing: -0.02em;">
        Tech disputes<br>need <span style="color: #5B5DD6;">tech evidence.</span>
      </h2>
      <div style="margin-top: 40px; width: 60px; height: 3px; background: #5B5DD6; margin-left: auto; margin-right: auto; border-radius: 2px;"></div>
      <p style="margin-top: 30px; font-size: 24px; color: rgba(255,255,255,0.6); line-height: 1.6;">
        Expert Witness · IP Forensics · Patent Analysis<br>
        Court-ready reports in 48 hours.
      </p>
      <div style="margin-top: 50px;">
        <div style="display: inline-flex; align-items: center; gap: 12px; padding: 20px 48px; background: linear-gradient(135deg, #4143C1, #5B5DD6); border-radius: 16px; font-size: 24px; font-weight: 700; box-shadow: 0 8px 32px rgba(65,67,193,0.4);">
          Confidential Consultation →
        </div>
      </div>
      <p style="margin-top: 24px; font-size: 18px; color: rgba(255,255,255,0.4);">hksolution.dev · NDA available upon request.</p>
    </div>

    <div style="position: absolute; bottom: 50px; left: 80px; width: 920px; z-index: 10;">
      <div style="display: flex; align-items: center; justify-content: space-between;">
        <div style="display: flex; align-items: center; gap: 12px;">
          <div style="width: 40px; height: 40px; background: linear-gradient(135deg, #4143C1, #5B5DD6); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800;">HK</div>
          <div>
            <div style="font-size: 18px; font-weight: 600;">hksolution.dev</div>
            <div style="font-size: 14px; color: rgba(255,255,255,0.4);">Security · Intelligence · Engineering</div>
          </div>
        </div>
        <span style="font-size: 16px; color: rgba(255,255,255,0.3);">4 / 4</span>
      </div>
    </div>
  </div>
</body>
</html>
