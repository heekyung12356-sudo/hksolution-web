<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
  </style>
</head>
<body>
  <div style="width: 1080px; height: 1350px; overflow: hidden; position: relative; background: #15295A; color: white;">
    <div style="position: absolute; inset: 0; background-image: url('https://images.pexels.com/photos/1181671/pexels-photo-1181671.jpeg?auto=compress&cs=tinysrgb&w=1080'); background-size: cover; background-position: center;"></div>
    <div style="position: absolute; inset: 0; background: linear-gradient(180deg, rgba(15,27,61,0.94) 0%, rgba(15,27,61,0.5) 45%, rgba(15,27,61,0.96) 100%);"></div>

    <div style="position: absolute; top: 60px; left: 80px; display: flex; align-items: center; gap: 15px; z-index: 10;">
      <div style="width: 50px; height: 50px; background: linear-gradient(135deg, #4143C1, #5B5DD6); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 800;">HK</div>
      <span style="font-size: 28px; font-weight: 600;">HK Solution</span>
    </div>

    <div style="position: absolute; top: 60px; right: 80px; display: flex; gap: 8px; z-index: 10;">
      <div style="width: 24px; height: 4px; background: #5B5DD6; border-radius: 2px;"></div>
      <div style="width: 12px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px;"></div>
      <div style="width: 12px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px;"></div>
      <div style="width: 12px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px;"></div>
    </div>

    <div style="position: absolute; top: 180px; left: 80px; z-index: 10;">
      <div style="display: inline-flex; align-items: center; gap: 8px; padding: 8px 20px; background: rgba(65,67,193,0.2); border: 1px solid rgba(91,93,214,0.4); border-radius: 20px;">
        <div style="width: 8px; height: 8px; background: #5B5DD6; border-radius: 50%;"></div>
        <span style="font-size: 14px; font-weight: 600; color: #5B5DD6; letter-spacing: 0.1em; text-transform: uppercase;">E2E Testing & QA</span>
      </div>
    </div>

    <div style="position: absolute; top: 300px; left: 80px; width: 920px; z-index: 10;">
      <h1 style="font-size: 80px; font-weight: 800; line-height: 1.05; letter-spacing: -0.03em;">
        "It Works on<br>
        My Machine"<br>
        Is <span style="color: #ff6b6b; text-decoration: line-through;">Not</span> a<br>
        <span style="color: #5B5DD6;">Test Result.</span>
      </h1>
      <div style="margin-top: 40px; width: 80px; height: 4px; background: linear-gradient(90deg, #4143C1, #5B5DD6); border-radius: 2px;"></div>
      <p style="margin-top: 30px; font-size: 28px; font-weight: 400; color: rgba(255,255,255,0.7); line-height: 1.5; max-width: 700px;">
        Every button. Every flow. Every edge case.<br>11 layers of verification. Zero gaps.
      </p>
    </div>

    <div style="position: absolute; bottom: 40px; left: 80px; width: 920px; display: flex; align-items: center; justify-content: space-between; z-index: 10;">
      <span style="font-size: 22px; font-weight: 500; color: rgba(255,255,255,0.4);">hksolution.dev</span>
      <div style="display: flex; gap: 6px; align-items: center;">
        <span style="font-size: 18px; color: #5B5DD6; font-weight: 600;">Swipe →</span>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="#5B5DD6"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
      </div>
    </div>
  </div>
</body>
</html>
